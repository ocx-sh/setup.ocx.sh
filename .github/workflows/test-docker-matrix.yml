name: Test docker matrix

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly run catches breakage in upstream distro images.
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (default: latest)'
        required: false

permissions:
  contents: read

concurrency:
  group: docker-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.distro }} / ${{ matrix.platform }}
    # Skip dependabot PRs (saves runner minutes; lint already covers them).
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [alpine, fedora, ubuntu]
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Run smoke (${{ matrix.distro }} on ${{ matrix.platform }})
        env:
          VERSION_ARG: ${{ inputs.release_tag }}
        run: |
          version=${VERSION_ARG#v}
          tests/docker/run.sh "${{ matrix.distro }}" "${{ matrix.platform }}" "${version:-latest}"
