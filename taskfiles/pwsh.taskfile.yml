# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# PowerShell quality gate. The `pwsh` interpreter is bootstrapped from ocx.toml
# (binding `pwsh`) via `ocx run` — no system PowerShell required. PSScriptAnalyzer
# is installed into the CurrentUser scope on demand.

version: '3'

tasks:
  verify:
    desc: PowerShell quality gate (PSScriptAnalyzer, pwsh via ocx.toml)
    cmd: |
      ocx run pwsh -- pwsh -NoProfile -Command '
        if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
        }
        Invoke-ScriptAnalyzer -Path src/install.ps1 -Severity Warning,Error -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit
      '

  format:check:
    desc: PSScriptAnalyzer format-rule subset (pwsh via ocx.toml)
    cmd: |
      ocx run pwsh -- pwsh -NoProfile -Command '
        Invoke-ScriptAnalyzer -Path src/install.ps1 -Settings PSGallery -EnableExit
      '
