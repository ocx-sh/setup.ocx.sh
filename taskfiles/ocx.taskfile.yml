# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Tool execution template backed by OCX. Each include creates a tool
# namespace (e.g., `shellcheck:`, `shfmt:`) — callers interact with
# the tool, not with OCX directly.
#
# `ocx run NAME -- BINARY ...` composes the project toolchain env. NAME is the
# binding declared in ocx.toml [tools] (ocx run takes binding NAMES, not
# package refs). The package ref (e.g. ocx.sh/shfmt:3) lives ONLY in ocx.toml.
#
# Root taskfile registers tools:
#
#   shellcheck:
#     taskfile: ./taskfiles/ocx.taskfile.yml
#     internal: true
#     vars: { NAME: shellcheck, TOOL: shellcheck, GLOB: '*.sh' }
#
# Subsystem taskfiles call the tool:
#
#   - task: :shellcheck:exec                        # defaults (no extra args)
#   - task: :shfmt:exec
#     vars: { ARGS: '-d -i 4 -ci' }                 # check mode
#
# Identity vars (set at include time):
#   NAME — ocx.toml [tools] binding name (passed to `ocx run`)
#   TOOL — binary name
#   GLOB — git ls-files glob pattern

version: '3'

tasks:
  exec:
    internal: true
    requires:
      vars: [NAME, TOOL, GLOB]
    preconditions:
      - sh: '[ -n "$(git ls-files "{{.GLOB}}")" ]'
        msg: 'No {{.GLOB}} files found, skipping {{.TOOL}}'
    cmd: ocx run {{.NAME}} -- {{.TOOL}} {{.ARGS}} {{.FILES}}
    vars:
      ARGS: '{{.ARGS | default ""}}'
      FILES:
        sh: git ls-files '{{.GLOB}}' | tr '\n' ' '

  exec:no-files:
    internal: true
    requires:
      vars: [NAME, TOOL]
    cmd: ocx run {{.NAME}} -- {{.TOOL}} {{.ARGS}}
    vars:
      ARGS: '{{.ARGS | default ""}}'
