# markdownlint-cli2 configuration.
#
# The docs and rules files are prose- and table-heavy by design: long lines,
# wide "compact" tables, the README's centered HTML logo block, and bare code
# fences for URL/path listings. Disable the purely-stylistic rules that conflict
# with that deliberate house style; keep every structural / correctness rule on.
config:
  MD013: false # line-length — long prose lines and inline URLs are intentional
  MD031: false # blanks-around-fences — fences inside dense tables/lists
  MD032: false # blanks-around-lists
  MD033: false # no-inline-html — README uses <div>/<img> for the logo header
  MD040: false # fenced-code-language — bare fences list URLs / paths
  MD041: false # first-line-heading — README opens with the HTML logo block
  MD060: false # table-column-style — compact pipe tables
