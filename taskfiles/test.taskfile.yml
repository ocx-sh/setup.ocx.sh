# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  bats:
    desc: Run Bats env-knob + exit-code + print-path suites against fixture HTTP server
    # bats is not an OCX-provisionable package; it must be on PATH (CI installs
    # it via apt, locally via your package manager).
    preconditions:
      - sh: command -v bats
        msg: 'bats not on PATH; install Bats to run this suite'
      - sh: command -v python3
        msg: 'python3 required for fixture HTTP server'
      - sh: command -v tar
        msg: 'tar required for fixture archive build'
      - sh: command -v xz
        msg: 'xz required for fixture archive build'
      - sh: command -v sha256sum
        msg: 'sha256sum required for fixture checksum generation'
    cmd: bats -r tests/install/

  pester:
    desc: Run Pester equivalents on Windows / pwsh
    preconditions:
      - sh: command -v pwsh
        msg: 'pwsh required for Pester tests'
    cmd: |
      pwsh -NoProfile -Command '
        if (-not (Get-Module -ListAvailable Pester)) {
          Install-Module -Name Pester -Scope CurrentUser -Force -Repository PSGallery -SkipPublisherCheck
        }
        $cfg = New-PesterConfiguration
        $cfg.Run.Path = "tests/install/ps1"
        $cfg.Run.Exit = $true
        $cfg.Output.Verbosity = "Detailed"
        Invoke-Pester -Configuration $cfg
      '

  bats:single:
    desc: Run a single Bats file (pass FILE=path/to.bats)
    requires: { vars: [FILE] }
    preconditions:
      - sh: command -v bats
        msg: 'bats not on PATH; install Bats to run this suite'
    cmd: bats {{.FILE}}
